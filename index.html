<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Brief — 데일리 브리프 아카이브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a18; --muted:#6b6b66; --faint:#9a9a94;
    --line:#e6e4dd; --bg:#faf9f6; --card:#ffffff;
    --green:#3d5a4c; --green-soft:#eef2ee;
    --terracotta:#8a4f3d; --terracotta-soft:#f5ede9;
    --blue:#1f5f8b; --blue-soft:#e8f0f5;
    --purple:#6b3f8a; --purple-soft:#f0eaf5;
    --gold:#8a6d3b; --gold-soft:#f5f0e5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,sans-serif;line-height:1.6;padding:0 20px}
  .wrap{max-width:760px;margin:0 auto;padding:64px 0 96px}
  header{border-bottom:1.5px solid var(--ink);padding-bottom:20px;margin-bottom:40px}
  .kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:14px}
  h1{font-family:'Newsreader',serif;font-weight:500;font-size:clamp(38px,8vw,58px);line-height:1.05;letter-spacing:-.02em}
  .sub{font-family:'Newsreader',serif;font-style:italic;font-size:17px;color:var(--muted);margin-top:14px}

  .latest{background:var(--card);border:1.5px solid var(--green);border-radius:16px;padding:26px;margin-bottom:44px;display:block;text-decoration:none;color:inherit;transition:transform .15s}
  .latest:hover{transform:translateY(-2px)}
  .latest .lt-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);font-weight:600;margin-bottom:8px}
  .latest .lt-title{font-family:'Newsreader',serif;font-size:26px;font-weight:600;letter-spacing:-.01em}
  .latest .lt-date{font-size:14px;color:var(--muted);margin-top:4px}

  .month-label{display:flex;align-items:center;gap:14px;margin:40px 0 16px}
  .month-label .m{font-family:'Newsreader',serif;font-size:20px;font-weight:600}
  .month-label .bar{flex:1;height:1px;background:var(--line)}

  .day-group{margin-bottom:6px}
  .row{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:8px;text-decoration:none;color:inherit;transition:border-color .15s}
  .row:hover{border-color:#cfcdc4}
  .row .r-date{font-size:12.5px;color:var(--faint);width:78px;flex-shrink:0;font-variant-numeric:tabular-nums}
  .row .r-badge{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:3px 10px;border-radius:20px;flex-shrink:0}
  .row .r-name{font-size:14.5px;font-weight:500;flex:1}
  .row .r-arrow{color:var(--faint);font-size:13px}

  .b-daily{color:var(--green);background:var(--green-soft)}
  .b-culture{color:var(--terracotta);background:var(--terracotta-soft)}
  .b-sports{color:var(--blue);background:var(--blue-soft)}
  .b-music{color:var(--purple);background:var(--purple-soft)}
  .b-etc{color:var(--gold);background:var(--gold-soft)}

  .state{text-align:center;color:var(--faint);padding:48px 0;font-size:14px}
  footer{margin-top:64px;padding-top:24px;border-top:1px solid var(--line);font-size:13px;color:var(--faint);line-height:1.7}
  footer .pipe{color:var(--green);font-weight:600}
  @media (max-width:520px){
    .wrap{padding:44px 0 72px}
    .row .r-date{width:66px;font-size:11.5px}
    .row .r-name{font-size:13.5px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">Daily Brief · 데일리 브리프</div>
    <h1>브리프 아카이브</h1>
    <p class="sub">매일 발행되는 메인 브리프와 요일별 서브 브리프 모음</p>
  </header>

  <div id="content"><div class="state">불러오는 중…</div></div>

  <footer>
    <span class="pipe">파이프라인</span> · 리서치(Haiku) → 편집(Haiku) → 마케팅 인사이트(Sonnet) → 디자인 렌더링(Sonnet)<br>
    파일을 push하면 이 목록은 자동으로 갱신됩니다 · 모든 정보는 참고용
  </footer>

</div>

<script>
const REPO = "nonojin99/Daily-Card-News";
const API = `https://api.github.com/repos/${REPO}/contents/`;

const TYPE_MAP = {
  "daily":    { label: "메인",       cls: "b-daily",   order: 0 },
  "sports":   { label: "스포츠",     cls: "b-sports",  order: 1 },
  "culture":  { label: "문화",       cls: "b-culture", order: 1 },
  "music":    { label: "음악",       cls: "b-music",   order: 1 },
  "travel":   { label: "여행",       cls: "b-etc",     order: 1 },
  "activity": { label: "액티비티",   cls: "b-etc",     order: 1 },
  "ai":       { label: "AI·테크",    cls: "b-etc",     order: 1 },
  "tech":     { label: "AI·테크",    cls: "b-etc",     order: 1 },
  "science":  { label: "우주·과학",  cls: "b-etc",     order: 1 },
  "space":    { label: "우주·과학",  cls: "b-etc",     order: 1 }
};

function parseFile(name, path){
  // 형식: YYYY-MM-DD_{type}-brief.html
  const m = name.match(/^(\d{4})-(\d{2})-(\d{2})_([a-z]+)-brief\.html$/i);
  if(!m) return null;
  const type = TYPE_MAP[m[4].toLowerCase()] || { label: m[4], cls: "b-etc", order: 2 };
  return { date: `${m[1]}-${m[2]}-${m[3]}`, month: `${m[1]}-${m[2]}`,
           year: m[1], mon: m[2], day: m[3], type, path };
}

async function fetchDir(path){
  const res = await fetch(API + path);
  if(!res.ok) throw new Error(res.status);
  return res.json();
}

async function load(){
  const el = document.getElementById("content");
  try{
    const root = await fetchDir("");
    let files = [];
    const odd = [];
    const dirs = [];
    for(const item of root){
      if(item.type === "file"){
        const p = parseFile(item.name, item.path);
        if(p) files.push(p);
        else if(/\.html?$/i.test(item.name) && item.name !== "index.html") odd.push(item.name);
      }else if(item.type === "dir" && /^\d{4}-\d{2}$/.test(item.name)){
        dirs.push(item.path); // 월별 폴더 (예: 2026-06)
      }
    }
    // 월별 폴더 안까지 수집
    for(const d of dirs){
      const inner = await fetchDir(d);
      for(const item of inner){
        if(item.type === "file"){
          const p = parseFile(item.name, item.path);
          if(p) files.push(p);
          else if(/\.html?$/i.test(item.name)) odd.push(item.path);
        }
      }
    }

    const warn = odd.length === 0 ? "" : `<div style="background:#fdf3f2;border:1px solid #e8c8c4;border-radius:12px;padding:14px 18px;margin-bottom:24px;font-size:13.5px;color:#8a3d33;line-height:1.7">⚠ <b>파일명 규칙에 안 맞는 HTML ${odd.length}개</b> — 목록에 표시되지 않으며 링크가 깨질 수 있습니다.<br>${odd.map(n=>`<code>${n}</code>`).join(", ")}<br>올바른 형식: <code>YYYY-MM-DD_type-brief.html</code> (소문자·공백 없음·"(1)" 같은 접미사 주의)</div>`;

    if(files.length === 0){
      el.innerHTML = warn + '<div class="state">아직 발행된 브리프가 없습니다.</div>';
      return;
    }

    // 최신 날짜 → 같은 날은 메인 먼저
    files.sort((a,b) => b.date.localeCompare(a.date) || a.type.order - b.type.order);

    const latest = files[0];
    const weekday = ["일","월","화","수","목","금","토"];
    const fmtDate = f => {
      const d = new Date(`${f.date}T00:00:00`);
      return `${Number(f.mon)}월 ${Number(f.day)}일 (${weekday[d.getDay()]})`;
    };

    let html = warn + `
      <a class="latest" href="${latest.path}">
        <div class="lt-label">📌 최신 브리프</div>
        <div class="lt-title">${latest.type.label} 브리프</div>
        <div class="lt-date">${latest.year}년 ${fmtDate(latest)}</div>
      </a>`;

    // 월별 그룹
    let currentMonth = "";
    for(const f of files){
      if(f.month !== currentMonth){
        currentMonth = f.month;
        html += `<div class="month-label"><span class="m">${f.year}년 ${Number(f.mon)}월</span><span class="bar"></span></div>`;
      }
      html += `
        <a class="row" href="${f.path}">
          <span class="r-date">${f.mon}.${f.day}</span>
          <span class="r-badge ${f.type.cls}">${f.type.label}</span>
          <span class="r-name">${f.type.label} 브리프 — ${fmtDate(f)}</span>
          <span class="r-arrow">→</span>
        </a>`;
    }
    el.innerHTML = html;
  }catch(e){
    el.innerHTML = '<div class="state">목록을 불러오지 못했습니다. 잠시 후 새로고침 해주세요.<br>(GitHub API 시간당 요청 제한일 수 있습니다)</div>';
  }
}
load();
</script>
</body>
</html>
